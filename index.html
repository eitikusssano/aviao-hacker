<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeroporto Inteligente - Operação Caixa-Preta</title>
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        .painel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        button { margin: 10px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        #btnGastar { background-color: #ff4d4d; color: white; }
        #btnAbastecerSeguro { background-color: #2ecc71; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="painel">
        <h2>Painel de Abastecimento ✈️</h2>
        <p id="painelCombustivel">Carregando dados do voo...</p>
        
        <button id="btnGastar">Gastar Combustível (Voar)</button>
        <button id="btnAbastecerSeguro">Abastecer 10%</button>
    </div>

    <script>class VooSeguro {
    // 1. Atributos Privados (Cadeados)
    #codigo;
    #combustivel;

    constructor(codigoPassado) {
        this.#codigo = codigoPassado;
        this.#combustivel = 100; // Começa cheio
    }

    // 2. GETTER: Para ler o combustível com segurança
    get lerCombustivel() {
        return `Voo ${this.#codigo}: ${this.#combustivel}% de combustível.`;
    }

    // 3. SETTER: Para abastecer com regras de segurança
    set abastecer(quantidade) {
        if (quantidade <= 0) {
            console.error("Operação negada: Quantidade inválida para abastecimento.");
        } else if (this.#combustivel + quantidade > 100) {
            this.#combustivel = 100;
            console.warn("Tanque cheio! Nível limitado a 100%.");
        } else {
            this.#combustivel += quantidade;
            console.log(`Abastecimento de ${quantidade}% realizado.`);
        }
    }

    // 4. MÉTODO: Para gastar combustível (Simular o voo)
    gastar(quantidade) {
        if (this.#combustivel - quantidade < 0) {
            alert("ALERTA: Combustível insuficiente para esta manobra!");
            this.#combustivel = 0;
        } else {
            this.#combustivel -= quantidade;
            console.log(`Combustível gasto: ${quantidade}%.`);
        }
    }
}

// --- INTEGRAÇÃO COM A TELA (DOM) ---

const meuVoo = new VooSeguro("VIP-001");

const painelTexto = document.getElementById("painelCombustivel");
const btnGastar = document.getElementById("btnGastar");
const btnAbastecer = document.getElementById("btnAbastecerSeguro");

// Função para atualizar a interface
function atualizarInterface() {
    painelTexto.innerText = meuVoo.lerCombustivel;
}

// Evento de Gastar (Simula voo de 15%)
btnGastar.addEventListener("click", () => {
    meuVoo.gastar(15);
    atualizarInterface();
});

// Evento de Abastecer (Usa o Setter para 10%)
btnAbastecer.addEventListener("click", () => {
    meuVoo.abastecer = 10;
    atualizarInterface();
});

// Inicializa a tela
atualizarInterface();</script>
</body>
</html>
